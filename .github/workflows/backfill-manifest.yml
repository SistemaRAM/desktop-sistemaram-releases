name: Backfill Release Manifest (TEMP)

on:
  workflow_dispatch:
    inputs:
      pattern:
        description: "Only tags matching this glob (default: all tags)"
        required: false
        type: string
        default: "*"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          persist-credentials: true

      - name: Backfill all tags into manifests
        env:
          PATTERN: ${{ inputs.pattern }}
        run: |
          set -euo pipefail

          for TAG in $(git tag -l "$PATTERN" | sort -V); do
            echo "::group::$TAG"

            if [[ "$TAG" =~ ^(manager|comandas|instaladores|drivers|add-?ons)\.(.+)$ ]]; then
              PRODUCT="${BASH_REMATCH[1]}"
            else
              PRODUCT=""
            fi

            case "$PRODUCT" in
              manager) FILE="releases-manager.json" ;;
              comandas) FILE="releases-comandas.json" ;;
              instaladores) FILE="releases-instaladores.json" ;;
              drivers) FILE="releases-drivers.json" ;;
              add-ons|addons) FILE="releases-addons.json" ;;
              *) FILE="releases.json" ;;
            esac

            if ! RELEASE_JSON=$(gh release view "$TAG" --json name,url,assets 2>/dev/null); then
              echo "No release found for $TAG, skipping."
              echo "::endgroup::"
              continue
            fi

            NAME=$(echo "$RELEASE_JSON" | jq -r '.name // empty')
            [ -z "$NAME" ] && NAME="$TAG"
            LINK=$(echo "$RELEASE_JSON" | jq -r '.url')
            echo "$RELEASE_JSON" | jq '[.assets[] | {name: .name, url: .url, size: .size}]' > anexos.json

            [ -f "$FILE" ] || echo '{}' > "$FILE"

            jq -n \
              --arg name "$NAME" \
              --arg tag "$TAG" \
              --arg link "$LINK" \
              --slurpfile anexos anexos.json \
              '{name: $name, tag: $tag, link: $link, anexos: $anexos[0]}' > entry.json

            jq --arg tag "$TAG" --slurpfile entry entry.json \
              '.[$tag] = $entry[0]' "$FILE" > "$FILE.tmp"
            mv "$FILE.tmp" "$FILE"

            rm -f entry.json anexos.json
            echo "::endgroup::"
          done

      - name: Commit & push manifests
        env:
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases*.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: backfill release manifests from existing tags"

          for i in 1 2 3 4 5; do
            if git pull --rebase origin "$BRANCH" && git push origin "HEAD:$BRANCH"; then
              exit 0
            fi
            echo "Push failed (attempt $i/5), retrying..."
            sleep 5
          done

          echo "Failed to push manifest update after 5 attempts."
          exit 1
